{% set name = "tobler" %}
{% set version = "0.12.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 96a05c2bd69569c5fadb940f7ad242dd8a43d12c7818c7ab97534e46670677f1

build:
  number: 0
  skip: true  # [py<310]
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --ignore-installed --no-cache-dir -vv

requirements:
  host:
    - python
    - pip
    - setuptools
    - wheel
  run:
    - python
    - numpy
    - pandas
    - geopandas >=0.13
    - rasterio
    - scipy >=0.11
    - statsmodels
    - rasterstats
    - libpysal >=4.10
    - tqdm
    - joblib

test:
  # Skipping long-running tests; import checks and one test_dasymetric
  # are sufficient to confirm installation.
  requires:
    - pip
    - pytest
  source_files:
    - tobler/tests/test_dasymetric.py
  imports:
    - tobler
    - tobler.area_weighted
    - tobler.area_weighted.area_interpolate
    - tobler.dasymetric
    - tobler.model
    - tobler.pycno
    - tobler.util
    - tobler.util.util
  commands:
    - pip check
    - pytest -v tobler/tests/test_dasymetric.py

about:
  home: https://github.com/pysal/tobler
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  summary: Tobler is a python package for areal interpolation, dasymetric mapping, and change of support.
  description: |
    Tobler is a python package for areal interpolation, dasymetric mapping, and change of support.
  doc_url: https://pysal.org/tobler
  dev_url: https://github.com/pysal/tobler

extra:
  skip-lints:
    - remove_python_pinning # scipy <1.13 unavailable on Python >=3.13
  recipe-maintainers:
    - knaaptime
    - sjsrey
